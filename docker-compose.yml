services:
    app:
        build: .
        container_name: fleetmaster_app
        env_file: .env
        restart: unless-stopped
        ports:
            - "${HTTP_PORT-8080}:${HTTP_PORT:-8080}"
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy

    db:
        image: postgres:17-alpine
        container_name: fleetmaster_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 5s
        ports:
            - "${POSTGRES_PORT:-5432}:5432"

    redis:
        image: redis:7-alpine
        container_name: fleetmaster_redis
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5
        ports:
            - "${REDIS_PORT:-6379}:6379"

    migrate:
        image: migrate/migrate:v4.19.1
        container_name: fleetmaster_migrate
        volumes:
            - ./migrations:/migrations
        env_file: .env
        command:
            - -path=/migrations/
            - -database=${DB_DSN}
            - up
        depends_on:
            db:
                condition: service_healthy
